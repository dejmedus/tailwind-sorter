name: Remind CLI sync

on:
  pull_request:
jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for watched files in PR
        id: check-for-watched-files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # List all changed files in this PR
          CHANGED=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path')
          echo "Changed files:"
          echo "$CHANGED"
          # Check if either file is in the list
          if echo "$CHANGED" | grep -qE 'src/sortTailwind\.ts|src/lib/regex\.ts'; then
            echo "needs_comment=true" >> $GITHUB_OUTPUT
          else
            echo "needs_comment=false" >> $GITHUB_OUTPUT
          fi

      - name: Leave sticky PR comment
        if: steps.check-for-watched-files.outputs.needs_comment == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🧐 This PR includes changes to `sortTailwind.ts` or `regex.ts`. [CLI](https://github.com/dejmedus/tailwind-sorter-cli) might need an update
